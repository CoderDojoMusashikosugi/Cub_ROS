ros_package_exclusive=(
"handy2_bringup"
"camera_ros"
"hesai_ros_driver"
)

ros_package_disable=(
"ekf_localizer"
"graph_based_slam"
"lidarslam"
"lidarslam_msgs"
"scanmatcher"
"ndt_omp_ros2"
"realsense2_camera"
"realsense2_camera_msgs"
"realsense2_description"
"realsense2_camera"
"perception"
"cub_behavior_tree"
"cub_commander"
"cub_description"
"cub_navigation"
"cub_visualization"
"wheel_odometry"
"sllidar_ros2"
)

container_install_scripts=(
"ros.sh"
"foxglove.sh"
"rtklib.sh"
"libpigpio.sh"
"grim_ppa.sh"
"libcamera.sh"
)

BASE_IMAGE=nvidia/cuda:12.6.3-cudnn-devel-ubuntu24.04
ADDITIONAL_PKGS="ros-${ROS_DISTRO}-glim-ros-cuda12.6 kdialog chrony pps-tools"
IMAGE_TYPE=handy2
IMAGE_VERSION=20260516_150704
BASE_IMAGE_VERSION=20260515_032202

environment_script_at_run() {
    # Raspberry Pi Global Shutter Camera向けに外部トリガを有効化
    if [ -e /sys/module/imx296/parameters/trigger_mode ]; then
        echo 1 | sudo tee /sys/module/imx296/parameters/trigger_mode > /dev/null 2>&1 || true
    fi
}
